apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: omniroute-workloads
spec:
  template:
    metadata:
      labels:
        omniroute.io/node-pool: workloads
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: omniroute-default
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["m6i.large", "m6i.xlarge", "c6i.large"]
      taints: []
  limits:
    cpu: 1000
    memory: 2000Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: omniroute-default
spec:
  amiFamily: AL2023
  role: omniroute-eks-node
  subnetSelectorTerms:
    - tags:
        Tier: private
  securityGroupSelectorTerms:
    - tags:
        Name: "*eks-nodes*"
  tags:
    omniroute.io/managed-by: karpenter
