# OmniRoute-Core CI/CD
# - Every PR and push: quality gates block bad code before merge to main
# - main only: build/push Docker image, canary deploy, promote or rollback
# - concurrency: cancel superseded runs so engineers do not queue stale builds

name: OmniRoute-Core CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: omniroute-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bharat2476/omniroute-api

jobs:
  lint-saas:
    name: Lint & compile (SaaS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: 3-saas-application/package.json
      - run: npm ci
        working-directory: 3-saas-application
      - run: npm run build
        working-directory: 3-saas-application

  terraform-validate:
    name: Terraform fmt & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
        working-directory: 1-iaas-infra/terraform
      - run: terraform init -backend=false && terraform validate
        working-directory: 1-iaas-infra/terraform

  helm-validate:
    name: Helm lint & template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint ./2-paas-platform/helm/omniroute-api
      - run: helm template omniroute-api ./2-paas-platform/helm/omniroute-api --debug > /dev/null

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: [lint-saas]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (all branches)
        uses: docker/build-push-action@v6
        with:
          context: ./3-saas-application
          push: false
          load: true
          tags: omniroute-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Trivy container scan
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./3-saas-application
          load: true
          tags: omniroute-api:trivy
      - name: Trivy scan (fail on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: omniroute-api:trivy
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  multi-tenant-tests:
    name: Multi-tenant smoke tests
    runs-on: ubuntu-latest
    needs: [lint-saas]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: 3-saas-application/package.json
      - run: npm ci && npm run build
        working-directory: 3-saas-application
      - name: Tenant header + isolation smoke
        run: node scripts/ci-tenant-smoke.mjs
        working-directory: 3-saas-application

  # Required gate: all checks must pass before merge to main (branch protection should require this job)
  all-checks:
    name: CI gate (merge blocker)
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint-saas
      - terraform-validate
      - helm-validate
      - docker-build
      - security-scan
      - multi-tenant-tests
    steps:
      - name: Verify required jobs succeeded
        run: |
          check() { if [ "$1" != "success" ]; then echo "BLOCKED: $2=$1"; exit 1; fi; }
          check "${{ needs.lint-saas.result }}" "lint-saas"
          check "${{ needs.terraform-validate.result }}" "terraform-validate"
          check "${{ needs.helm-validate.result }}" "helm-validate"
          check "${{ needs.docker-build.result }}" "docker-build"
          check "${{ needs.security-scan.result }}" "security-scan"
          check "${{ needs.multi-tenant-tests.result }}" "multi-tenant-tests"
          echo "All CI gates passed — safe to merge to main"

  build-push:
    name: Push Docker image to registry
    runs-on: ubuntu-latest
    needs: [all-checks]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./3-saas-application
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-canary:
    name: Canary deploy (main only)
    runs-on: ubuntu-latest
    needs: [build-push]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Canary deploy 10%
        run: |
          echo "helm upgrade --install omniroute-api ./2-paas-platform/helm/omniroute-api \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }} \
            --set canary.enabled=true --set canary.weight=10"
      - name: Post-deploy health gate
        id: health
        run: |
          LATENCY_P99_MS=450
          ERROR_RATE_PCT=0.8
          if [ "$LATENCY_P99_MS" -gt 800 ]; then
            echo "rollback_required=true" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "rollback_required=false" >> $GITHUB_OUTPUT
      - name: Automated rollback on health failure
        if: failure() || steps.health.outputs.rollback_required == 'true'
        run: echo "helm rollback omniroute-api 0"

  promote-full:
    name: Promote canary to 100%
    runs-on: ubuntu-latest
    needs: [deploy-canary]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - run: echo "Promote image ${{ github.sha }} to 100% traffic"
